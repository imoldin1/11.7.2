<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Коментарі (Етап 8)</title>
</head>
<body>
    <!-- Головна секція: Вступ до сторінки -->
    <h1>Як використовувати Коментарі</h1>
    <p>Коментарі не відображаються у браузері, але є видимими у вихідному коді сторінки.</p>

    <!-- !!! Нагадування: Потрібно додати тут розділ "Переваги HTML" !!! -->

    <h2>Закоментований Контент</h2>
    <!-- 
        Цей параграф повністю закоментований.
        Він не з'явиться на сторінці.
        <p>Це прихований текст.</p>
    -->
    <p>
        Весь закоментований код (включно з тегами) ігнорується браузером.
    </p>
    
    <hr>
    <!-- Цей коментар знаходиться в кінці тіла сторінки -->
</body>
</html>
